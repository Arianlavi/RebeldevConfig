# =============================================================================
# RebelDev Enhanced Auto Scanner - GitHub Actions Workflow
# =============================================================================
name: "🚀 RebelDev - Ultra Scanner"

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force full refresh (clear cache)'
        required: false
        default: false
        type: boolean
  push:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'
  SCANNER_VERSION: '4.8.0'
  MAX_SCAN_TIME: '55m'

jobs:
  ultra-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    
    permissions:
      contents: write

    steps:
      - name: "🔄 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: "📦 Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: "⚡ System Optimization"
        run: |
          sudo sysctl -w net.ipv4.ping_group_range="0 2147483647" || true
          sudo apt-get update && sudo apt-get install -y curl iputils-ping || true

      - name: "🧹 Clean Everything"
        run: |
          rm -rf RebelLink/ config_cache.json scanner.log || true
          echo "🧼 Cache cleaned"

      - name: "🚀 Run Ultra Scanner"
        run: |
          echo "🌟 Starting RebelDev Ultra Scanner v${{ env.SCANNER_VERSION }}"
          echo "Force Refresh: ${{ inputs.force_refresh || 'false' }}"
          timeout ${{ env.MAX_SCAN_TIME }} python auto_scanner.py
        env:
          FORCE_REFRESH: ${{ inputs.force_refresh || 'false' }}

      - name: "✅ Validate & Show Results"
        run: |
          echo "🔍 Validating results..."
          if [ -f "RebelLink/performance_report.json" ]; then
            python3 - <<EOF
import json
try:
    with open("RebelLink/performance_report.json") as f:
        r = json.load(f)
    m = r.get("performance_metrics", {})
    print("✅ SCAN SUCCESSFUL")
    print("="*50)
    print(f"📊 Valid Configs   : {m.get('valid_configs', 0)}")
    print(f"📈 Success Rate    : {m.get('success_rate', 0)}%")
    print(f"⚡ Avg Latency     : {m.get('avg_latency_ms', 0)}ms")
    print(f"⭐ Avg Score       : {m.get('avg_score', 0)}")
    print(f"⏱ Duration       : {r.get('duration_seconds', 0)}s")
except Exception as e:
    print(f"⚠️ Report error: {e}")
EOF
          fi

      - name: "🔄 Smart Commit & Push"
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "RebelDev Ultra Scanner"
          
          if git diff --quiet HEAD -- RebelLink/; then
            echo "🟡 No changes"
          else
            git add RebelLink/
            VALID=$(python3 -c "
import json
try:
    with open('RebelLink/performance_report.json') as f:
        print(json.load(f)['performance_metrics']['valid_configs'])
except: print('N/A')
" 2>/dev/null || echo "N/A")
            
            git commit -m "🤖 Ultra Update $(date -u +'%Y-%m-%d %H:%M UTC')" \
                       -m "v${{ env.SCANNER_VERSION }} • ${VALID} valid configs"
            
            git pull --rebase origin main || true
            git push
            echo "🚀 Successfully pushed new configs"
          fi

      - name: "📤 Upload Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebeldev-scan-${{ github.run_number }}
          path: |
            RebelLink/
            scanner.log
            performance_report.json
          retention-days: 14
